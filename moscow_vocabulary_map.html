<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moscow · Vocabulary Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f1;--surface:#fff;--border:#e4dfd6;--border2:#cfc9be;
  --ink:#1c1a17;--ink2:#5a5448;--ink3:#9a8e80;
  --red:#b83a2a;--red-bg:#fdf2f0;
  --teal:#2a7a5e;--teal-bg:#f0f7f4;
  --amber:#9a6820;--amber-bg:#fdf6ec;
  --accent:#b83a2a;--r:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
}
html{scroll-behavior:smooth}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;font-weight:300}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem}
.h-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.h-title{display:flex;align-items:baseline;gap:.5rem}
.h-title h1{font-family:'Lora',serif;font-size:1.1rem;font-weight:500}
.h-title span{font-size:.75rem;color:var(--ink3)}
.h-back{font-size:.78rem;color:var(--ink3);text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .15s;white-space:nowrap}
.h-back:hover{color:var(--accent)}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1.5rem;position:sticky;top:0;z-index:40}
.tb1{max-width:980px;margin:0 auto;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.tb2{max-width:980px;margin:.45rem auto 0;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
input[type=text]{flex:1;min-width:160px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.4rem .85rem;font-family:inherit;font-size:.82rem;color:var(--ink);outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--border2)}
.pill{border:1px solid var(--border);background:transparent;border-radius:20px;padding:.28rem .8rem;font-family:inherit;font-size:.72rem;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--border2);color:var(--ink)}
.pill.on{background:var(--ink);border-color:var(--ink);color:#fff}
.tb-ct{font-size:.72rem;color:var(--ink3);margin-left:auto}
.ctl{display:flex;align-items:center;gap:.45rem;font-size:.76rem;color:var(--ink3)}
input[type=range]{width:88px;height:3px;-webkit-appearance:none;background:var(--border);border-radius:2px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.rv{color:var(--ink);font-weight:600;min-width:24px;font-size:.76rem}
select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--ink2);font-family:inherit;font-size:.75rem;padding:.22rem .5rem;cursor:pointer;max-width:175px}

/* SPEECH PANEL */
.sp-wrap{max-width:980px;margin:1rem auto 0;padding:0 1.5rem}
.sp-box{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:var(--r);padding:.75rem 1rem;box-shadow:var(--shadow);display:none;animation:fadeUp .2s}
.sp-box.open{display:block}
.sp-lbl{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:.3rem}
.sp-heard{font-size:.88rem;color:var(--ink);margin-bottom:.25rem;min-height:1.2rem}
.sp-heard b{color:var(--teal)}
.sp-heard s{color:var(--red);text-decoration-color:var(--red)}
.sp-verdict{font-size:.78rem}
.sp-verdict.good{color:var(--teal)}
.sp-verdict.bad{color:var(--red)}
.sp-verdict.mid{color:var(--amber)}

/* TABLE */
.wrap{max-width:980px;margin:1.2rem auto 1.5rem;padding:0 1.5rem}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
th{font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:.6rem 1rem;border-bottom:1px solid var(--border);text-align:left;background:var(--bg)}
td{padding:.8rem 1rem;border-bottom:1px solid var(--bg);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fbfaf7}
.cw{width:22%}.ci{width:16%}.cr{width:13%}.ce{width:41%}.cs{width:8%;text-align:center}
.wn{font-family:'Lora',serif;font-size:.92rem;font-weight:500;color:var(--ink);margin-bottom:.28rem;line-height:1.3}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:1px 6px;border-radius:3px;border:1px solid;display:inline-block}
.bv{color:var(--teal);border-color:var(--teal);background:var(--teal-bg)}
.bc{color:var(--amber);border-color:var(--amber);background:var(--amber-bg)}
.bp{color:var(--red);border-color:var(--red);background:var(--red-bg)}
.ipa{font-family:'Courier New',monospace;font-size:.76rem;color:var(--ink2);line-height:1.5}
.ru{font-size:.8rem;color:var(--ink2);line-height:1.5}
.ee{font-size:.8rem;color:var(--ink);line-height:1.6;margin-bottom:.18rem}
.er{font-size:.74rem;color:var(--ink3);font-style:italic;line-height:1.5}
.btn-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.sb{background:none;border:1px solid var(--border);border-radius:4px;width:28px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;color:var(--ink3);transition:all .15s;padding:0}
.sb:hover{border-color:var(--border2);color:var(--ink)}
.sb.playing{border-color:var(--accent);color:var(--accent);background:var(--red-bg)}
.sb.listening{border-color:var(--teal);color:var(--teal);background:var(--teal-bg);animation:pulse .7s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.slb{font-size:.5rem;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase}
.no-r{text-align:center;padding:2.5rem;color:var(--ink3);font-style:italic;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow)}

/* FEEDBACK */
.fb-wrap{max-width:980px;margin:0 auto 3rem;padding:0 1.5rem}
.fb-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem 1.5rem;box-shadow:var(--shadow)}
.fb-h{font-family:'Lora',serif;font-size:.95rem;font-weight:500;margin-bottom:.8rem;color:var(--ink)}
.stars{display:flex;gap:.25rem;margin-bottom:.8rem}
.star{font-size:1.3rem;cursor:pointer;opacity:.3;transition:opacity .15s,transform .15s;user-select:none}
.star:hover,.star.on{opacity:1}
.star:hover{transform:scale(1.2)}
.chips{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.7rem}
.chip{border:1px solid var(--border);border-radius:20px;padding:.25rem .8rem;font-size:.75rem;color:var(--ink2);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s}
.chip:hover{border-color:var(--border2)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.55rem .85rem;font-family:inherit;font-size:.8rem;color:var(--ink);resize:vertical;min-height:68px;outline:none;transition:border-color .2s;margin-bottom:.7rem;display:block}
textarea:focus{border-color:var(--border2)}
.fb-row{display:flex;align-items:center;gap:.9rem}
.fb-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:.5rem 1.3rem;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s}
.fb-btn:hover{background:var(--accent2,#d4522e)}
.fb-ok{font-size:.82rem;color:var(--teal);font-weight:600;display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>

<script>
const D=[
  {t:'vocab',w:'inseparable from',i:'/ɪnˈsɛp.ər.ə.bəl frəm/',r:'неотделим от',e:'The history of Moscow is inseparable from the history of the country.',r2:'История Москвы неотделима от истории страны.'},
  {t:'vocab',w:'prosperous',i:'/ˈprɒs.pər.əs/',r:'процветающий',e:'It developed into a prosperous city over the centuries.',r2:'Он превратился в процветающий город за столетия.'},
  {t:'vocab',w:'architectural ensemble',i:'/ˌɑːk.ɪˈtek.tʃər.əl ɒnˈsɒm.bəl/',r:'архитектурный ансамбль',e:'It is a unique architectural ensemble, famous all over the world.',r2:'Это уникальный архитектурный ансамбль, известный всему миру.'},
  {t:'vocab',w:'chimes',i:'/tʃaɪmz/',r:'куранты',e:'The most famous tower is the Spasskaya Tower with its chimes.',r2:'Самая знаменитая — Спасская башня с курантами.'},
  {t:'vocab',w:'outlooks onto',i:'/ˈaʊt.lʊks ˈɒn.tuː/',r:'выходит на',e:'The Spasskaya Tower outlooks Red Square and the Pokrovsky Cathedral.',r2:'Спасская башня выходит на Красную площадь и собор.'},
  {t:'vocab',w:'exotic beauty',i:'/ɪɡˈzɒt.ɪk ˈbjuːti/',r:'экзотическая красота',e:'The cathedral is famous for its exotic beauty.',r2:'Собор известен своей экзотической красотой.'},
  {t:'vocab',w:'ceremonial dresses',i:'/ˌser.ɪˈməʊ.ni.əl ˈdres.ɪz/',r:'парадные одеяния',e:'The museum displays crowns, coaches and ceremonial dresses.',r2:'В музее выставлены короны, кареты и парадные облачения.'},
  {t:'vocab',w:'the seat of the government',i:'/ðə siːt əv ðə ˈɡʌv.ən.mənt/',r:'резиденция правительства',e:'Moscow is the seat of the government of the Russian Federation.',r2:'Москва — резиденция правительства РФ.'},
  {t:'vocab',w:'boundary',i:'/ˈbaʊnd.ri/',r:'граница; рубеж',e:'At first it was a little town on the boundary of the Kiev Russia.',r2:'Сначала это был маленький город на рубеже Киевской Руси.'},
  {t:'vocab',w:'come across',i:'/kʌm əˈkrɒs/',r:'наткнуться; встретить',e:'One can come across the sights on every step in Moscow.',r2:'В Москве достопримечательности встречаются на каждом шагу.'},
  {t:'vocab',w:'traffic jams',i:'/ˈtræf.ɪk dʒæmz/',r:'пробки',e:'Like any metropolis, Moscow has lines of cars and traffic jams.',r2:'Как любой мегаполис, Москва страдает от пробок.'},
  {t:'vocab',w:'capturing',i:'/ˈkæp.tʃər.ɪŋ/',r:'захватывающий',e:'Its appearance is not always attractive, but fascinating and capturing.',r2:'Облик не всегда привлекателен, но захватывающий.'},
  {t:'vocab',w:'beyond any doubt',i:'/bɪˈjɒnd ˈen.i daʊt/',r:'вне всяких сомнений',e:'Moscow is beyond any doubt one of the greatest cities in the world.',r2:'Москва вне всяких сомнений — один из величайших городов.'},
  {t:'vocab',w:'strolling by',i:'/ˈstrəʊ.lɪŋ baɪ/',r:'прогуливающиеся мимо',e:'One can enjoy watching the crowds of people strolling by on Arbat.',r2:'На Арбате приятно наблюдать за прогуливающимися людьми.'},
  {t:'vocab',w:'metropolis',i:'/məˈtrɒp.ə.lɪs/',r:'мегаполис',e:'Moscow is like any other metropolis — full of energy and contradictions.',r2:'Москва как любой мегаполис — полна энергии и противоречий.'},
  {t:'vocab',w:'treasures of the tsars',i:'/ˈtreʒ.əz əv ðə zɑːz/',r:'сокровища царей',e:'The Armoury is an exhibition of the treasures of the Russian tsars.',r2:'Оружейная палата — выставка сокровищ русских царей.'},
  {t:'phrase',w:'founded in … by …',i:'/ˈfaʊn.dɪd ɪn … baɪ/',r:'основан в … кем-то',e:'Moscow was founded in 1147 by Prince Yury Dolgoruky.',r2:'Москва основана в 1147 году Юрием Долгоруким.'},

  {t:'phrase',w:'played an important role in',i:'/pleɪd ən ɪmˈpɔː.tənt rəʊl ɪn/',r:'играл важную роль в',e:'Moscow still played an important role in the life of Russia.',r2:'Москва по-прежнему играла важную роль в жизни России.'},
  {t:'phrase',w:'at present',i:'/æt ˈprez.ənt/',r:'в настоящее время',e:'At present Moscow is the largest city in the Russian Federation.',r2:'В настоящее время Москва — крупнейший город России.'},

  {t:'cliche',w:'What really stands out is',i:'/wɒt ˈrɪəli stændz aʊt ɪz/',r:'что действительно выделяется',e:'What really stands out is the sheer scale of Red Square.',r2:'Что действительно поражает — масштаб Красной площади.'},
  {t:'cliche',w:"It's worth mentioning that",i:'/ɪts wɜːθ ˈmen.ʃən.ɪŋ ðæt/',r:'стоит отметить, что',e:"It's worth mentioning that Moscow has over nine million inhabitants.",r2:'Стоит отметить, что в Москве более 9 миллионов жителей.'},
  {t:'cliche',w:"One can't help but notice",i:'/wʌn kænt help bʌt ˈnəʊ.tɪs/',r:'нельзя не заметить',e:"One can't help but notice the contrast between old cathedrals and modern towers.",r2:'Нельзя не заметить контраст между соборами и современными башнями.'},
  {t:'cliche',w:'What strikes me most is',i:'/wɒt straɪks miː məʊst ɪz/',r:'больше всего поражает',e:'What strikes me most is how history blends with modern life in Moscow.',r2:'Больше всего поражает, как история переплетается с современностью.'},
  {t:'cliche',w:'To be perfectly honest',i:'/tə biː ˈpɜː.fɪkt.li ˈɒn.ɪst/',r:'если быть честным',e:'To be perfectly honest, I had no idea the Kremlin had over twenty towers.',r2:'Если честно, я не знал, что в Кремле более двадцати башен.'},

let filter='all',voices=[],curBtn=null,curMic=null,recog=null,fbRating=0;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

/* TTS */
function loadVoices(){
  if(!window.speechSynthesis)return;
  voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  const s=document.getElementById('vs');s.innerHTML='';
  if(!voices.length){s.innerHTML='<option>No EN voices</option>';return;}
  voices.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name+(v.default?' ★':'');s.appendChild(o);});
  const p=voices.findIndex(v=>v.name.toLowerCase().includes('daniel')||v.lang==='en-GB');
  if(p>=0)s.value=p;
}
function tts(text,btn){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  if(curBtn){curBtn.classList.remove('playing');curBtn.textContent=curBtn.dataset.orig||'🔊';}
  if(curBtn===btn){curBtn=null;return;}
  const u=new SpeechSynthesisUtterance(text);
  const s=document.getElementById('vs');
  u.rate=parseFloat(document.getElementById('rs').value);
  if(voices.length&&s.value!=='')u.voice=voices[+s.value];
  btn.dataset.orig=btn.textContent;
  u.onstart=()=>{btn.classList.add('playing');btn.textContent='⏸';curBtn=btn;};
  u.onend=u.onerror=()=>{btn.classList.remove('playing');btn.textContent=btn.dataset.orig||'🔊';if(curBtn===btn)curBtn=null;};
  speechSynthesis.speak(u);
}

/* STT */
function mic(target,btn){
  if(!SR){alert('Speech recognition needs Chrome or Edge.');return;}
  if(recog){recog.abort();recog=null;}
  if(curMic&&curMic!==btn){curMic.classList.remove('listening');curMic.textContent='🎤';}
  if(curMic===btn){btn.classList.remove('listening');btn.textContent='🎤';curMic=null;closePanel();return;}
  recog=new SR();recog.lang='en-US';recog.interimResults=false;recog.maxAlternatives=3;
  btn.classList.add('listening');btn.textContent='⏹';curMic=btn;
  openPanel('Listening… speak now','');
  recog.onresult=e=>{
    const heard=e.results[0][0].transcript.trim().toLowerCase();
    showResult(target,heard);
    btn.classList.remove('listening');btn.textContent='🎤';curMic=null;
  };
  recog.onerror=()=>{openPanel('Could not hear clearly. Try again.','mid');btn.classList.remove('listening');btn.textContent='🎤';curMic=null;};
  recog.onend=()=>{if(curMic===btn){btn.classList.remove('listening');btn.textContent='🎤';curMic=null;}};
  recog.start();
}
function openPanel(msg,cls){
  const b=document.getElementById('spBox');b.classList.add('open');
  document.getElementById('spH').innerHTML=msg;
  const v=document.getElementById('spV');v.textContent='';v.className='sp-verdict'+(cls?' '+cls:'');
}
function closePanel(){document.getElementById('spBox').classList.remove('open');}
function showResult(target,heard){
  const tWords=target.toLowerCase().replace(/[…\.,']/g,'').split(' ');
  const hWords=heard.split(' ');
  const hl=hWords.map(w=>{const c=w.replace(/[^a-z]/g,'');return tWords.includes(c)?`<b>${w}</b>`:`<s>${w}</s>`;}).join(' ');
  document.getElementById('spH').innerHTML=`You said: "${hl}"`;
  const score=hWords.filter(w=>tWords.includes(w.replace(/[^a-z]/g,''))).length/Math.max(tWords.length,1);
  const v=document.getElementById('spV');
  if(score>=0.75){v.textContent='✓ Great pronunciation!';v.className='sp-verdict good';}
  else if(score>=0.4){v.textContent='Almost — try once more.';v.className='sp-verdict mid';}
  else{v.textContent='Listen first, then speak slowly.';v.className='sp-verdict bad';}
  document.getElementById('spBox').classList.add('open');
}

/* TABLE */
function setF(f,btn){filter=f;document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const rows=D.filter(d=>{
    const mf=filter==='all'||d.t===filter;
    const mq=!q||[d.w,d.r,d.e,d.r2].some(s=>s.toLowerCase().includes(q));
    return mf&&mq;
  });
  document.getElementById('ct').textContent=`${rows.length} / ${D.length}`;
  document.getElementById('nr').style.display=rows.length?'none':'block';
  const bc=t=>t==='vocab'?'bv':t==='cliche'?'bc':'bp';
  const bl=t=>t==='vocab'?'Vocabulary':t==='cliche'?'Cliché':'Phrase';
  document.getElementById('tb').innerHTML=rows.map((d,i)=>{
    const ws=d.w.replace(/'/g,"\\'").replace(/[…]/g,'');
    const es=d.e.replace(/'/g,"\\'");
    return`<tr style="animation:fadeUp .22s ${i*.025}s both">
      <td class="cw"><div class="wn">${d.w}</div><span class="badge ${bc(d.t)}">${bl(d.t)}</span></td>
      <td class="ci ipa">${d.i}</td>
      <td class="cr ru">${d.r}</td>
      <td class="ce"><div class="ee">${d.e}</div><div class="er">${d.r2}</div></td>
      <td class="cs"><div class="btn-col">
        <button class="sb" title="Hear word" onclick="tts('${ws}',this)">🔊</button>
        <span class="slb">word</span>
        <button class="sb" title="Hear example" onclick="tts('${es}',this)">▶</button>
        <span class="slb">example</span>
        <button class="sb" title="Practise pronunciation" onclick="mic('${ws}',this)">🎤</button>
        <span class="slb">say it</span>
      </div></td>
    </tr>`;
  }).join('');
}

/* FEEDBACK */
document.getElementById('stars').addEventListener('click',e=>{
  if(!e.target.classList.contains('star'))return;
  fbRating=+e.target.dataset.v;
  document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.v<=fbRating));
});
function submitFb(){
  const chips=[...document.querySelectorAll('.chip.on')].map(c=>c.textContent);
  const text=document.getElementById('fbTxt').value.trim();
  console.log('Feedback:',{rating:fbRating,chips,text,map:'Moscow'});
  document.getElementById('fbOk').style.display='inline';
  document.querySelector('.fb-btn').style.display='none';
}

/* INIT */
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=loadVoices;loadVoices();setTimeout(loadVoices,500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&recog)recog.abort();});
const sty=document.createElement('style');
sty.textContent='@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}';
document.head.appendChild(sty);
render();
</script>
